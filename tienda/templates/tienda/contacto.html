<!DOCTYPE html>
<html lang="es">
<head>
    <meta property="og:title" content="El Zoco Market - Contacto">
<meta property="og:description" content="Tecnología y Reparaciones. ¡Contáctanos!">
<meta property="og:image" content="https://elzoco.pythonanywhere.com/static/img/logo.jpg">
<meta property="og:url" content="https://elzoco.pythonanywhere.com/contacto">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Zoco Integrate Service - Contacto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #10b981; /* Verde esmeralda (Salud y Energía) */
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .card {
            background: var(--card-bg);
            width: 90%;
            max-width: 350px;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(248, 192, 6, 0.78);
        }

        .profile-img {
    width: 120px; /* Un poco más grande para que luzca el logo */
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 4px solid #334155;
    overflow: hidden; /* Esto recorta la imagen en forma de círculo */
    background: white; /* Fondo blanco por si tu logo es transparente */
}

.profile-img img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ajusta la imagen sin deformarla */
}

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: var(--primary-color);
        }

        .btn-whatsapp { border-left: 5px solid #25d366; }
        .btn-web { border-left: 5px solid #f6da3b; }
        .btn-fb { border-left: 5px solid #1877f2; }
        .btn-ig { border-left: 5px solid #e1306c; }

        .footer { font-size: 0.7rem; color: #475569; margin-top: 1.5rem; }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-img">
    <img src="https://elzoco.pythonanywhere.com/static/img/estructura/ELZOCO.png" alt="Logo El Zoco">
</div>
    <h1>El Zoco Integrate Service</h1>
    <p>Tecnología y Reparaciones</p>

    <a href="https://elzoco.pythonanywhere.com/" class="btn btn-web" target="_blank">
        <i class="fas fa-globe"></i> Visita Nuestra Web
    </a>

    
    <a href="https://wa.me/525580867149" class="btn btn-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <a href="https://www.facebook.com/ElZocogrup" class="btn btn-fb" target="_blank">
        <i class="fab fa-facebook"></i> Facebook
    </a>

    <a href="https://www.instagram.com/el.zoco.grup/" class="btn btn-ig" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>

    <div class="footer">
        © 2005 El Zoco Grup - México Todos Los Derechos Reservados
    </div>
</div>

</body>
</html>
